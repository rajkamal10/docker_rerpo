name: Merge Checks
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: python setup
        uses : actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run the addition script
        run: python addition.py
